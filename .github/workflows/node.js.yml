# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
  pull_request:
  release:

# Prevent redundant builds on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  prepare:
    name: "Prepare"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - run: printf "Event:${{ github.event_name }}"
      - name: Get the version
        id: get_version
        run: if [ "${GITHUB_EVENT_NAME}" == "push" ]; then echo "VERSION=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT; else echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT; fi
        
  build:
    name: "Build"
    needs: [prepare]
    # Run job for: github releases, tag pushes without github release and regular pushes (not tag)
    if: github.event_name == 'release' || !contains(github.ref, 'refs/tags/') || needs.prepare.outputs.create_release == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/
    env:
      TARBALL_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
    - uses: actions/checkout@v5
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v5
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm run build --if-present
    - run: sed -i "s|{{VERSION}}|${TARBALL_VERSION}|g" build/config.js
    - uses: actions/upload-artifact@master
      with:
        name: build-output
        path: build/
        retention-days: 1

  release:
    name: "Release"
    needs: [prepare, build]
    # Runs only when a GitHub release is created
    if: github.event_name == 'release'
    runs-on: ubuntu-latest

    permissions:
      contents: write # Essential for uploading assets to releases

    env:
      TARBALL_VERSION: ${{ needs.prepare.outputs.version }}
      # The tag name is needed by the 'gh' tool to identify the release
      TAG_NAME: ${{ github.event.release.tag_name }}

    steps:
      - name: Download build output artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: build/

      - name: Create release tarball
        # -C build . tells tar to change to the 'build' directory before archiving
        run: tar -pczvf "discovery-service-frontend-${TARBALL_VERSION}.tar.gz" -C build .

      - name: Upload Release Asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release upload "$TAG_NAME" "discovery-service-frontend-${TARBALL_VERSION}.tar.gz" --clobber

